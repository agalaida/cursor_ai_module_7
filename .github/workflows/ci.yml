name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies + scanners
        run: pip install -r requirements.txt bandit pip-audit

      - name: Bandit (SAST)
        run: bandit -r app -ll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: functional
            paths: tests/test_admin.py tests/test_assignment.py tests/test_auth.py tests/test_comments.py tests/test_status.py tests/test_tickets.py tests/test_users.py tests/test_validation.py
          - suite: security-edge
            paths: tests/test_security.py tests/test_edge_cases.py tests/test_rate_limit.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ${{ matrix.suite }} tests
        run: pytest ${{ matrix.paths }} -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: coverage.xml
          retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Deploy to staging
        run: echo "Deploying backend to staging (placeholder — no real infra target)."

      - name: Smoke test
        run: echo "curl -f https://staging.example.com/api/health (placeholder)"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Deploy to green environment
        run: echo "Deploying backend to green slot (placeholder — no real infra target)."

      - name: Health check green
        run: echo "Polling https://green.example.com/api/health (placeholder)."

      - name: Switch traffic to green
        run: echo "Switching load balancer to green (placeholder)."

      - name: Rollback on failure
        if: failure()
        run: echo "Rolling back to blue environment (placeholder)."

      - name: Notify team
        if: always()
        continue-on-error: true
        run: echo "Would notify Slack via ${{ secrets.SLACK_WEBHOOK != '' && 'configured webhook' || 'no webhook configured — skipping' }}"
